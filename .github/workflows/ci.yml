name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, test, audit, build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Matches package.json "engines": { "node": ">=20.0.0" }
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run engine tests
        run: npm test

      - name: Security audit
        run: npm run security:audit

      - name: Production build
        run: npm run build

      - name: Verify dist hygiene
        # We rely on Vite's esbuild `pure` option to strip real
        # console.log/debug/info CALLS from the production bundle. The
        # only legitimate matches that remain are STRING LITERALS inside
        # src/data/codeSnippets.ts — content the user TYPES in code mode,
        # not executed code. Those bundle into the CodeMode-<hash>.js
        # chunk, which we exclude from the scan.
        run: |
          set -e
          if find dist -name "*.map" | grep -q .; then
            echo "::error::Source maps found in dist/ — vite.config.ts must set build.sourcemap=false"
            find dist -name "*.map"
            exit 1
          fi
          # `|| true` so the pipeline doesn't fail when grep finds zero matches.
          offenders=$(grep -lE "console\.(log|debug|info)\(" dist/assets/*.js 2>/dev/null \
            | grep -Ev "/CodeMode-[^/]*\.js$" || true)
          if [ -n "$offenders" ]; then
            echo "::error::Live console.log/debug/info found in prod bundle"
            echo "$offenders"
            exit 1
          fi
          echo "dist hygiene OK"
